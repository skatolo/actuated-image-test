          sudo systemd-analyze critical-chain docker.socket > /tmp/bootdiag/critical-chain-docker-socket.txt
          sudo systemd-analyze critical-chain docker.service > /tmp/bootdiag/critical-chain-docker-service.txt
          sudo systemd-analyze critical-chain runner.mount > /tmp/bootdiag/critical-chain-runner-mount.txt || true
